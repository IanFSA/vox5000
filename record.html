<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vox5000 — Browser Audio Editor</title>
  <meta name="description" content="Record, import, edit, process and export voice audio in your browser. No account. No install. No cloud audio storage." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" sizes="512x512" href="favicon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="record.css" />
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="editor-body">
  <div class="editor-app wave-normal" id="main-content">
    <header class="editor-menubar" role="banner">
      <a href="/" class="editor-logo" aria-label="Vox5000 home"><img src="logo.png" alt="VOX5000" /></a>
      <nav class="editor-menus" aria-label="Editor menus">
        <div class="menu">
          <button class="menu-btn" aria-expanded="false" type="button">File</button>
          <div class="menu-popover">
            <label for="fileInput">Import audio</label>
            <button data-editor-action="newMono">New mono file</button>
            <button data-editor-action="newStereo">New stereo file</button>
            <button data-editor-action="export">Export file</button>
            <button data-editor-action="new">New session</button>
          </div>
        </div>
        <div class="menu">
          <button class="menu-btn" aria-expanded="false" type="button">Edit</button>
          <div class="menu-popover">
            <button data-editor-action="undo">Undo</button>
            <button data-editor-action="redo">Redo</button>
            <button data-editor-action="copy">Copy selection</button>
            <button data-editor-action="paste">Paste</button>
            <button data-editor-action="trim">Trim</button>
            <button data-editor-action="delete">Delete selection</button>
            <button data-editor-action="split">Split</button>
          </div>
        </div>
        <div class="menu">
          <button class="menu-btn" aria-expanded="false" type="button">Audio</button>
          <div class="menu-popover">
            <button data-editor-action="recordMono">Record mono</button>
            <button data-editor-action="recordStereo">Record stereo</button>
            <button data-editor-action="newMono">New mono file</button>
            <button data-editor-action="newStereo">New stereo file</button>
          </div>
        </div>
        <div class="menu">
          <button class="menu-btn" aria-expanded="false" type="button">Effects</button>
          <div class="menu-popover">
            <button data-editor-action="normalize">Normalize</button>
            <button data-editor-action="fadeIn">Fade in</button>
            <button data-editor-action="fadeOut">Fade out</button>
            <button data-editor-action="compress">Compressor</button>
            <button data-editor-action="limit">Hard limiter</button>
            <button data-editor-action="noise">Noise gate</button>
            <button data-editor-action="silence">Remove silence</button>
            <button data-editor-action="eq">Apply EQ</button>
          </div>
        </div>
        <div class="menu">
          <button class="menu-btn" aria-expanded="false" type="button">View</button>
          <div class="menu-popover">
            <button data-editor-action="start">Go to start</button>
            <button data-editor-action="clearSelection">Clear selection</button>
            <button data-editor-action="zoomIn">Zoom in</button>
            <button data-editor-action="zoomOut">Zoom out</button>
            <button data-editor-action="zoomReset">Reset zoom</button>
            <button data-editor-action="waveCompact">Compact waveform</button>
            <button data-editor-action="waveNormal">Normal waveform</button>
            <button data-editor-action="waveLarge">Large waveform</button>
          </div>
        </div>
        <div class="menu">
          <button class="menu-btn" aria-expanded="false" type="button">Help</button>
          <div class="menu-popover">
            <button data-editor-action="showShortcuts">Keyboard shortcuts</button>
            <a href="/help">VOX5000 help</a>
          </div>
        </div>
      </nav>
      <a href="/room" class="editor-room-link">Create room</a>
    </header>

    <input id="fileInput" class="file-input" type="file" accept="audio/*" />

    <section class="editor-toolbar" aria-label="Transport and editing controls">
      <div class="time-stack">
        <div class="time-display" id="timeDisplay">00:00.000</div>
        <div class="time-sub" id="durationText">Duration: 00:00.000</div>
      </div>

      <div class="transport-group">
        <button class="square-btn stop" id="stopBtn" disabled title="Stop">■</button>
        <button class="square-btn play" id="playBtn" disabled title="Play or pause">▶</button>
        <button class="square-btn" id="rewindBtn" disabled title="Go to start">|◀</button>
        <button class="square-btn" id="recordBtn" title="Record"><span class="record-dot"></span></button>
      </div>

      <div class="tool-group">
        <button class="square-btn" id="undoBtn" disabled title="Undo">↶</button>
        <button class="square-btn" id="redoBtn" disabled title="Redo">↷</button>
        <button class="square-btn" id="trimBtn" disabled title="Trim to selection">⟦⟧</button>
        <button class="square-btn" id="deleteBtn" disabled title="Delete selection">✂</button>
        <button class="square-btn" id="splitBtn" disabled title="Split">S</button>
        <button class="square-btn" id="fadeInBtn" disabled title="Fade in">╱</button>
        <button class="square-btn" id="fadeOutBtn" disabled title="Fade out">╲</button>
      </div>

      <div class="selection-stack">
        <div class="selection-label">Selection</div>
        <div class="selection-grid">
          <span>Start</span><strong id="selectionStartText">--:--.---</strong>
          <span>End</span><strong id="selectionEndText">--:--.---</strong>
          <span>Duration</span><strong id="selectionLengthText">--:--.---</strong>
        </div>
      </div>
    </section>

    <section class="wave-editor" aria-label="Waveform editor">
      <aside class="channel-strip mono" id="channelScale" aria-label="Channel scale">
        <span class="scale-label">6</span>
        <span class="scale-label channel">1</span>
        <span class="scale-label">6</span>
        <span class="scale-label small">1x</span>
        <div class="zoom-buttons" aria-label="Zoom controls">
          <button data-editor-action="zoomIn" title="Zoom in">+</button>
          <button data-editor-action="zoomOut" title="Zoom out">−</button>
          <button data-editor-action="zoomReset" title="Reset zoom">1x</button>
        </div>
      </aside>

      <div class="wave-area">
        <div class="overview-stage" aria-label="Full file overview">
          <canvas id="overviewCanvas" class="overview-waveform" height="86"></canvas>
        </div>
        <div class="wave-stage">
          <canvas id="waveCanvas" class="editor-waveform" height="420"></canvas>
          <div class="timeline-hint" id="timelineHint">
            Drag and drop an audio file here, or use File > Import audio.
          </div>
        </div>
      </div>
    </section>

    <section class="editor-footerbar" aria-label="Processing, input and export">
      <div class="footer-module input-module">
        <label for="micSelect">Mic</label>
        <select id="micSelect" class="compact-select"><option value="">Allow mic access</option></select>
        <div class="mini-meter" role="meter" aria-label="Input level">
          <div id="meterBar"></div>
        </div>
      </div>

      <div class="footer-module effects-module">
        <button class="compact-btn" id="normalizeBtn" disabled>Normalize</button>
        <button class="compact-btn" id="compressBtn" disabled>Compressor</button>
        <button class="compact-btn" id="limitBtn" disabled>Limiter</button>
        <button class="compact-btn" id="noiseBtn" disabled>Gate</button>
        <button class="compact-btn" id="silenceBtn" disabled>Silence</button>
      </div>

      <div class="footer-module eq-module">
        <label for="lowEq">Low</label><input id="lowEq" type="range" min="-12" max="12" step="1" value="0" />
        <label for="midEq">Mid</label><input id="midEq" type="range" min="-12" max="12" step="1" value="0" />
        <label for="highEq">High</label><input id="highEq" type="range" min="-12" max="12" step="1" value="0" />
        <button class="compact-btn" id="eqBtn" disabled>Apply EQ</button>
      </div>

      <div class="footer-module export-module">
        <select id="exportFormat" class="compact-select">
          <option value="mp3">MP3 256 kbps</option>
          <option value="wav">WAV 16-bit</option>
        </select>
        <button class="compact-btn export" id="exportBtn" disabled>Export</button>
        <button class="compact-btn" id="newBtn">New</button>
        <div class="download-slot" id="downloadSlot" aria-live="polite"></div>
      </div>
    </section>

    <div class="editor-status-line">
      <span id="statusText" aria-live="polite">No audio loaded</span>
      <span id="formatText">48 kHz browser session</span>
      <span id="selectionText">Selection: none</span>
    </div>

    <div class="shortcut-modal" id="shortcutModal" hidden role="dialog" aria-modal="true" aria-labelledby="shortcutTitle">
      <div class="shortcut-panel">
        <div class="shortcut-head">
          <div>
            <p class="panel-kicker">Personal setup</p>
            <h2 id="shortcutTitle">Keyboard shortcuts</h2>
          </div>
          <button class="square-btn" id="shortcutClose" type="button" aria-label="Close shortcuts">×</button>
        </div>
        <div class="shortcut-list" id="shortcutList">
          <label><span>Play / pause</span><input data-shortcut-input="playPause" readonly /></label>
          <label><span>Record</span><input data-shortcut-input="record" readonly /></label>
          <label><span>Delete selection</span><input data-shortcut-input="deleteSelection" readonly /></label>
          <label><span>Undo</span><input data-shortcut-input="undo" readonly /></label>
          <label><span>Redo</span><input data-shortcut-input="redo" readonly /></label>
          <label><span>Cut or split</span><input data-shortcut-input="cutSplit" readonly /></label>
          <label><span>Copy selection</span><input data-shortcut-input="copy" readonly /></label>
          <label><span>Paste</span><input data-shortcut-input="paste" readonly /></label>
          <label><span>Add marker</span><input data-shortcut-input="marker" readonly /></label>
        </div>
        <div class="shortcut-actions">
          <button class="compact-btn" id="shortcutReset" type="button">Reset defaults</button>
          <button class="compact-btn export" id="shortcutSave" type="button">Save shortcuts</button>
        </div>
      </div>
    </div>
  </div>

  <script src="record.js"></script>
</body>
</html>
